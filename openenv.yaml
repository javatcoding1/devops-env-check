name: devops-incident-response
version: 1.0.0
description: "A production-grade DevOps Incident Response simulation. Agents must diagnose hidden root causes (CPU overload, memory leaks, database issues, cache failures) from evolving system logs and metrics. Features failure propagation, multi-step action dependencies, and realistic reward signals."

action:
  type: object
  properties:
    action_str:
      type: string
      description: "One of: restart_service:api, restart_service:database, scale_up:cpu, optimize_database, clear_cache, check_logs, do_nothing"
  required:
    - action_str

observation:
  type: object
  properties:
    logs:
      type: string
    cpu_usage:
      type: integer
    memory_usage:
      type: integer
    db_latency:
      type: string
    services:
      type: array
      items:
        type: string
    status:
      type: string
    step_count:
      type: integer
    message:
      type: string
    reward:
      type: number
    done:
      type: boolean
  required:
    - logs
    - cpu_usage
    - memory_usage
    - status
    - done