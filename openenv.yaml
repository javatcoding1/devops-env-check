name: devops-incident-response
version: "1.0.0"
description: "DevOps Incident Response Environment with AI-powered diagnosis"

endpoints:
  reset: /reset
  step: /step
  state: /state

methods:
  reset: POST
  step: POST
  state: GET

actions:
  type: discrete
  values:
    - restart_service:api
    - restart_service:database
    - scale_up:cpu
    - optimize_database
    - clear_cache
    - check_logs
    - do_nothing

observation:
  type: object
  properties:
    logs:
      type: string
    cpu_usage:
      type: number
    memory_usage:
      type: number
    db_latency:
      type: string
    services:
      type: array
    status:
      type: string
    step_count:
      type: number