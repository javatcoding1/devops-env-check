[project]
name = "devops-incident-response"
version = "1.0.0"
description = "DevOps Incident Response Environment with AI agent"
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "Jayanth" }]
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "openai",
    "pydantic",
    "python-dotenv",
    "requests"
]

[project.scripts]
server = "app:run_server"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
